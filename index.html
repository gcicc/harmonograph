<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Harmono">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Harmonograph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300;400&display=swap');
:root{--bg:#0d1117;--sand:#c4a882;--text:#e6ddd0;--text-dim:#7d7567;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;overflow:hidden;}
canvas{display:block;flex:1;touch-action:none;}
.top{display:flex;align-items:center;justify-content:space-between;padding:calc(10px+env(safe-area-inset-top)) 14px 4px;flex-shrink:0;transition:opacity 0.5s;}
.top.hidden{opacity:0;pointer-events:none;}
.title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;letter-spacing:3px;color:var(--sand);text-transform:uppercase;}
.bottom{padding:4px 14px calc(8px+env(safe-area-inset-bottom));flex-shrink:0;transition:opacity 0.5s;}
.bottom.hidden{opacity:0;pointer-events:none;}
.presets{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;}
.preset{background:none;border:1px solid rgba(196,168,130,0.12);color:var(--text-dim);padding:4px 8px;border-radius:10px;font-size:8px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;}
.preset.active{color:var(--sand);border-color:rgba(196,168,130,0.3);}
.ctrl{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.ctrl-lbl{font-size:7px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;width:45px;flex-shrink:0;}
.ctrl input{flex:1;accent-color:var(--sand);}
.ctrl .val{min-width:28px;text-align:right;font-size:11px;color:var(--sand);font-variant-numeric:tabular-nums;}
.btns{display:flex;justify-content:center;gap:8px;margin-top:4px;}
.btn{background:none;border:1px solid rgba(196,168,130,0.3);color:var(--sand);padding:5px 14px;border-radius:14px;font-family:'Cormorant Garamond',serif;font-size:12px;cursor:pointer;letter-spacing:1px;}
.btn:active{transform:scale(0.95);}
.colors{display:flex;gap:5px;justify-content:center;margin-bottom:4px;}
.cdot{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.cdot.active{border-color:var(--sand);transform:scale(1.1);}
</style>
</head>
<body>
<div class="top" id="topBar"><span class="title">Harmonograph</span></div>
<canvas id="c"></canvas>
<div class="bottom" id="bottomBar">
  <div class="presets" id="presets"></div>
  <div class="colors" id="colors"></div>
  <div class="ctrl"><span class="ctrl-lbl">Freq X</span><input type="range" id="fxSlider" min="1" max="10" value="3" step="0.1"><span class="val" id="fxVal">3.0</span></div>
  <div class="ctrl"><span class="ctrl-lbl">Freq Y</span><input type="range" id="fySlider" min="1" max="10" value="2" step="0.1"><span class="val" id="fyVal">2.0</span></div>
  <div class="ctrl"><span class="ctrl-lbl">Phase</span><input type="range" id="phSlider" min="0" max="314" value="157"><span class="val" id="phVal">1.57</span></div>
  <div class="ctrl"><span class="ctrl-lbl">Damping</span><input type="range" id="dampSlider" min="0" max="100" value="5"><span class="val" id="dampVal">0.05</span></div>
  <div class="ctrl"><span class="ctrl-lbl">Speed</span><input type="range" id="spdSlider" min="10" max="300" value="100"><span class="val" id="spdVal">1.0x</span></div>
  <div class="btns">
    <button class="btn" id="btnNew">New</button>
    <button class="btn" id="btnPause">Pause</button>
    <button class="btn" id="btnImmerse">Immerse</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr,cx,cy;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=canvas.clientWidth;H=canvas.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2;cy=H/2;
}
window.addEventListener('resize',resize);
resize();

let fx=3, fy=2, phase=Math.PI/2, damping=0.005, speed=1;
let t=0, paused=false, immersed=false;
let penColor='#c4a882';
let lastX=null, lastY=null;

const COLORS=['#c4a882','#9b8ec4','#6ba3be','#d4a843','#c47d7d','#7c9a72','#e6ddd0','#4fc3f7','#ff6b35'];

const PRESETS=[
  {name:'Lissajous 3:2', fx:3,fy:2,ph:1.57,d:0.003},
  {name:'Rose 5:4', fx:5,fy:4,ph:0.5,d:0.004},
  {name:'Star', fx:5,fy:3,ph:1.0,d:0.005},
  {name:'Spiral', fx:1,fy:1,ph:1.57,d:0.02},
  {name:'Butterfly', fx:3,fy:4,ph:0.78,d:0.003},
  {name:'Knot', fx:7,fy:5,ph:0.3,d:0.002},
  {name:'Orbit', fx:2,fy:3,ph:2.0,d:0.006},
  {name:'Random', fx:0,fy:0,ph:0,d:0},
];

function renderPresets(){
  const el=document.getElementById('presets');
  el.innerHTML='';
  PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='preset';
    b.textContent=p.name;
    b.addEventListener('click',()=>{
      if(p.name==='Random'){
        fx=1+Math.random()*9; fy=1+Math.random()*9;
        phase=Math.random()*Math.PI*2; damping=0.001+Math.random()*0.02;
      } else {
        fx=p.fx; fy=p.fy; phase=p.ph; damping=p.d;
      }
      syncSliders(); restart();
    });
    el.appendChild(b);
  });
}

function renderColors(){
  const el=document.getElementById('colors');
  el.innerHTML='';
  COLORS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cdot'+(c===penColor?' active':'');
    d.style.background=c;
    d.addEventListener('click',()=>{penColor=c;renderColors();});
    el.appendChild(d);
  });
}

function syncSliders(){
  document.getElementById('fxSlider').value=fx;
  document.getElementById('fxVal').textContent=fx.toFixed(1);
  document.getElementById('fySlider').value=fy;
  document.getElementById('fyVal').textContent=fy.toFixed(1);
  document.getElementById('phSlider').value=Math.round(phase*100);
  document.getElementById('phVal').textContent=phase.toFixed(2);
  document.getElementById('dampSlider').value=Math.round(damping*2000);
  document.getElementById('dampVal').textContent=damping.toFixed(3);
}

function restart(){
  t=0; lastX=null; lastY=null;
  ctx.fillStyle='#0d1117'; ctx.fillRect(0,0,W,H);
  paused=false;
  document.getElementById('btnPause').textContent='Pause';
}

function draw(){
  if(!paused){
    const steps=Math.max(1,Math.round(speed*3));
    for(let s=0;s<steps;s++){
      t+=0.01;
      const decay=Math.exp(-damping*t);
      const R=Math.min(W,H)*0.4;
      const x=cx+R*Math.sin(fx*t+phase)*decay;
      const y=cy+R*Math.sin(fy*t)*decay;

      if(lastX!==null){
        ctx.strokeStyle=penColor;
        ctx.lineWidth=1;
        ctx.globalAlpha=Math.max(0.05,decay);
        ctx.beginPath();
        ctx.moveTo(lastX,lastY);
        ctx.lineTo(x,y);
        ctx.stroke();
        ctx.globalAlpha=1;
      }
      lastX=x; lastY=y;

      // Stop when fully damped
      if(decay<0.005){paused=true;break;}
    }
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// Controls
document.getElementById('fxSlider').addEventListener('input',e=>{fx=parseFloat(e.target.value);document.getElementById('fxVal').textContent=fx.toFixed(1);restart();});
document.getElementById('fySlider').addEventListener('input',e=>{fy=parseFloat(e.target.value);document.getElementById('fyVal').textContent=fy.toFixed(1);restart();});
document.getElementById('phSlider').addEventListener('input',e=>{phase=parseInt(e.target.value)/100;document.getElementById('phVal').textContent=phase.toFixed(2);restart();});
document.getElementById('dampSlider').addEventListener('input',e=>{damping=parseInt(e.target.value)/2000;document.getElementById('dampVal').textContent=damping.toFixed(3);restart();});
document.getElementById('spdSlider').addEventListener('input',e=>{speed=parseInt(e.target.value)/100;document.getElementById('spdVal').textContent=speed.toFixed(1)+'x';});
document.getElementById('btnNew').addEventListener('click',()=>{fx=1+Math.random()*9;fy=1+Math.random()*9;phase=Math.random()*Math.PI*2;damping=0.001+Math.random()*0.02;syncSliders();restart();});
document.getElementById('btnPause').addEventListener('click',()=>{paused=!paused;document.getElementById('btnPause').textContent=paused?'Resume':'Pause';});

const topBar=document.getElementById('topBar'),bottomBar=document.getElementById('bottomBar');
document.getElementById('btnImmerse').addEventListener('click',()=>{immersed=true;topBar.classList.add('hidden');bottomBar.classList.add('hidden');});
canvas.addEventListener('touchstart',e=>{if(immersed){e.preventDefault();immersed=false;topBar.classList.remove('hidden');bottomBar.classList.remove('hidden');}},{passive:false});
canvas.addEventListener('click',()=>{if(immersed){immersed=false;topBar.classList.remove('hidden');bottomBar.classList.remove('hidden');}});

renderPresets();renderColors();syncSliders();
ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
